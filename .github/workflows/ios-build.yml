name: Build iOS (Device)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pin Xcode 16.2 (avoids Xcode 26+ SPM explicit-module bug)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.2"

      - name: Verify SDK
        run: |
          xcrun --sdk iphoneos --show-sdk-path
          xcodebuild -version
          xcodebuild -showsdks

      - name: Install iOS 18.2 Simulator Runtime
        run: |
          xcodebuild -downloadPlatform iOS -quiet 2>&1 || \
            xcrun simctl runtime add "iOS 18.2 Simulator Runtime" 2>/dev/null || true
          xcrun simctl list runtimes 2>&1 | grep iOS

      - name: Resolve SPM dependencies
        working-directory: swift-frontend
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo

      - name: Build .app (unsigned)
        working-directory: swift-frontend
        run: |
          xcodebuild clean build \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo \
            -configuration ${{ inputs.configuration }} \
            -sdk iphoneos18.2 \
            ONLY_ACTIVE_ARCH=YES \
            TARGETED_DEVICE_FAMILY=1 \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CLANG_ENABLE_MODULE_DEBUGGING=NO

      - name: Copy .app from DerivedData
        run: |
          find $HOME/Library/Developer/Xcode/DerivedData/VisionDemo-*/Build/Products/Release-iphoneos \
            -name "VisionDemo.app" -type d | head -1 | while read APP; do
            cp -R "$APP" swift-frontend/build/App/
          done

      - name: Resign (ad-hoc)
        working-directory: swift-frontend
        run: |
          codesign -f -s - --entitlements VisionDemo/VisionDemo.entitlements \
            build/App/VisionDemo.app 2>/dev/null || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R swift-frontend/build/App/VisionDemo.app Payload/VisionDemo.app
          zip -r vision-demo.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-demo-ios-unsigned
          path: vision-demo.ipa
          if-no-files-found: error
          retention-days: 7
