name: Build iOS (Device)

# Builds an unsigned IPA from the native Swift/Xcode vision-demo project.
# Pure SPM dependencies (no CocoaPods, no Expo).
# Archives with CODE_SIGNING_ALLOWED=NO for sideload/sign services.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pin Xcode (latest 16.x)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Resolve SPM dependencies
        working-directory: swift-frontend
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo

      - name: Build .app (unsigned)
        working-directory: swift-frontend
        run: |
          # Strip BroadcastExtension from the scheme to avoid
          # "no such module Logging" error in LiveKit Broadcast sources
          python3 -c "
import xml.etree.ElementTree as ET
NS='http://schemas.apple.com/xcscheme/3.0'
ET.register_namespace('',NS)
t=ET.parse('VisionDemo.xcodeproj/xcshareddata/xcschemes/VisionDemo.xcscheme')
r=t.getroot()
ba=r.find('{%s}BuildAction'%NS)
for e in list(ba.findall('{%s}BuildActionEntry'%NS)):
  br=e.find('{%s}BuildableReference'%NS)
  if br is not None and br.get('BlueprintName')=='BroadcastExtension':
    ba.remove(e)
t.write('VisionDemo.xcodeproj/xcshareddata/xcschemes/VisionDemo.xcscheme',
  xml_declaration=True, encoding='UTF-8')
print('done')
"

          xcodebuild clean build \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo \
            -configuration ${{ inputs.configuration }} \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -jobs 2 \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CONFIGURATION_BUILD_DIR=build/App

      - name: Resign (ad-hoc)
        working-directory: swift-frontend
        run: |
          codesign -f -s - --entitlements VisionDemo/VisionDemo.entitlements \
            build/App/VisionDemo.app 2>/dev/null || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R swift-frontend/build/App/VisionDemo.app Payload/VisionDemo.app
          zip -r vision-demo.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-demo-ios-unsigned
          path: vision-demo.ipa
          if-no-files-found: error
          retention-days: 7
