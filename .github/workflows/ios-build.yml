name: Build iOS (Device)

# Builds an unsigned IPA from the native Swift/Xcode vision-demo project.
# Pure SPM dependencies (no CocoaPods, no Expo).
# Archives with CODE_SIGNING_ALLOWED=NO for sideload/sign services.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pin Xcode (latest 16.x)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest

      - name: Resolve SPM dependencies
        working-directory: swift-frontend
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo

      - name: Build .app (unsigned)
        working-directory: swift-frontend
        run: |
          # Skip BroadcastExtension — build main app only
          xcodebuild clean build \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo \
            -configuration ${{ inputs.configuration }} \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            SWIFT_COMPILATION_MODE=incremental \
            -jobs 2 \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CONFIGURATION_BUILD_DIR=build/App

      - name: Resign (ad-hoc)
        working-directory: swift-frontend
        run: |
          # Ad-hoc sign without a provisioning profile so the .app is installable
          # after the user re-signs with their own identity
          codesign -f -s - --entitlements VisionDemo/VisionDemo.entitlements build/App/VisionDemo.app 2>/dev/null || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R swift-frontend/build/App/VisionDemo.app Payload/VisionDemo.app
          zip -r vision-demo.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-demo-ios-unsigned
          path: vision-demo.ipa
          if-no-files-found: error
          retention-days: 7
