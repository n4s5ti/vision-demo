name: Build iOS (Device)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve SPM dependencies
        working-directory: swift-frontend
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo

      - name: Build .app (unsigned)
        working-directory: swift-frontend
        run: |
          xcodebuild clean build \
            -workspace VisionDemo.xcodeproj/project.xcworkspace \
            -scheme VisionDemo \
            -configuration ${{ inputs.configuration }} \
            -sdk iphoneos \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            -jobs 2 \
            -skipMacroValidation \
            -skipPackagePluginValidation \
            CLANG_ENABLE_MODULE_DEBUGGING=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            CONFIGURATION_BUILD_DIR=build/App

      - name: Resign (ad-hoc)
        working-directory: swift-frontend
        run: |
          codesign -f -s - --entitlements VisionDemo/VisionDemo.entitlements \
            build/App/VisionDemo.app 2>/dev/null || true

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R swift-frontend/build/App/VisionDemo.app Payload/VisionDemo.app
          zip -r vision-demo.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-demo-ios-unsigned
          path: vision-demo.ipa
          if-no-files-found: error
          retention-days: 7
