name: Build iOS (Device)

# Builds an unsigned IPA from the native Swift/Xcode vision-demo project.
# Pure SPM dependencies (no CocoaPods, no Expo).
# Archives with CODE_SIGNING_ALLOWED=NO for sideload/sign services.

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Release
          - Debug

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Pin Xcode (latest 16.x)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16.3"

      - name: Resolve SPM dependencies
        working-directory: swift-frontend
        run: |
          xcodebuild -resolvePackageDependencies \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo

      - name: Archive .app (unsigned)
        working-directory: swift-frontend
        run: |
          xcodebuild clean archive \
            -project VisionDemo.xcodeproj \
            -scheme VisionDemo \
            -configuration ${{ inputs.configuration }} \
            -archivePath build/VisionDemo.xcarchive \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            ONLY_ACTIVE_ARCH=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SWIFT_STRICT_CONCURRENCY=minimal \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -skipMacroValidation \
            -skipPackagePluginValidation

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R swift-frontend/build/VisionDemo.xcarchive/Products/Applications/VisionDemo.app \
            Payload/VisionDemo.app
          zip -r vision-demo.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: vision-demo-ios-unsigned
          path: vision-demo.ipa
          if-no-files-found: error
          retention-days: 7
